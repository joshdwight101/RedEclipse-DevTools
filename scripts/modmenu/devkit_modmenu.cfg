// Red Eclipse DevKit mod menu
// Install by copying this file and presets folder into your redeclipse data/scripts path.

alias devkit_menu_cmd [ if (= $numargs 0) [ showgui devkit_modmenu ] [ result "usage: /devkitmenu" ] ]
alias devkit_load_preset [ if (= $numargs 1) [ exec (concatword "presets/" $arg1 ".cfg") ] [ echo "usage: /devkitload <preset>" ] ]

newgui devkit_modmenu [
  guilist [
    guitext "Red Eclipse DevKit Preset Loader" 0
    guibutton "Load lowgrav_training" [ devkit_load_preset "lowgrav_training" ]
    guibutton "Load arena_hardcore" [ devkit_load_preset "arena_hardcore" ]
    guibutton "Load physics_parkour" [ devkit_load_preset "physics_parkour" ]
  ]
]

echo "DevKit mod menu installed. Command: /devkitmenu"
