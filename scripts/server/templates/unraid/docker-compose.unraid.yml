services:
  redeclipse-server:
    image: redeclipse-devkit:latest
    build:
      context: /mnt/user/appdata/redeclipse-devkit/repo
      dockerfile: docker/Dockerfile
    container_name: redeclipse-server
    restart: unless-stopped
    env_file:
      - /mnt/user/appdata/redeclipse-devkit/.env
    volumes:
      - /mnt/user/appdata/redeclipse-devkit/data:/usr/lib/games/redeclipse/data
      - /mnt/user/appdata/redeclipse-devkit/config:/home/redeclipse/.redeclipse
      - /dev/shm/redeclipse:/dev/shm/redeclipse
    ports:
      - "28801:28801/udp"
      - "28852:28852/tcp"
